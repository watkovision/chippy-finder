kind = "mobile"
previewPath = "/mobile/"
title = "Chippy Finder Mobile"
version = "1.0.0"
id = "artifacts/chippy-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22629

[services.development]
run = "pnpm --filter @workspace/chippy-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chippy-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/chippy-mobile", "run", "serve" ]

[services.env]
PORT = "22629"
BASE_PATH = "/mobile/"
